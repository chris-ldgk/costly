name: Migrate production database

on:
  workflow_dispatch:
  push:
    branches:
      - main
    # paths:
    #   - apps/api/drizzle/**

concurrency:
  group: migrate-production
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Ephemeral Tailscale node — joins the tailnet for this job only, then logs out.
      # Requires TS_OAUTH_CLIENT_ID + TS_OAUTH_SECRET (OAuth client with auth_keys scope, tag:ci).
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: 100.69.229.78

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run production migrations
        working-directory: apps/api
        env:
          PRODUCTION_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
        run: bun run db:migrate:production
